version: '3.8'

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      mlflow ui 
      --host 0.0.0.0 
      --port 5001 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root ./mlruns 
      --allowed-hosts "*"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    depends_on:
      - mlflow